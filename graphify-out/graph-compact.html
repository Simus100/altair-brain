<!DOCTYPE html>
<html lang="it"><head><meta charset="utf-8">
<title>altair-brain — vista compatta strutturale</title>
<style>
  html,body{margin:0;height:100%;background:#0f1115;color:#e6e6e6;font-family:system-ui,sans-serif}
  #h{position:fixed;top:12px;left:16px;z-index:10}
  #h b{font-size:16px} #h span{font-size:12px;color:#9aa0aa}
  #leg{position:fixed;top:12px;right:16px;z-index:10;font-size:12px;background:#171a21;
       border:1px solid #2a2f3a;border-radius:8px;padding:8px 10px}
  .sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle}
  svg{width:100vw;height:100vh;display:block}
  .lnk{stroke:#3a4150;stroke-width:1} .lnk.flow{stroke:#6ea8fe;stroke-width:2.5}
  .lnk.loop{stroke:#f0a35e;stroke-width:2;stroke-dasharray:5 4} .lnk.has{stroke:#2a2f3a}
  .lnk.derive{stroke:#4a5568;stroke-dasharray:2 3} .lnk.bridge{stroke:#e5c07b;stroke-width:2.5}
  text{fill:#cfd3da;font-size:11px;pointer-events:none}
  .fase text{fill:#fff;font-size:13px;font-weight:600}
</style></head><body>
<div id="h"><b>altair-brain</b> &nbsp;<span>vista compatta &mdash; processo a 5 fasi, un nodo per area</span></div>
<div id="leg">
  <div><span class="sw" style="background:#6ea8fe"></span>processo (fasi)</div>
  <div><span class="sw" style="background:#7ed0a8"></span>aion</div><div><span class="sw" style="background:#c39bf0"></span>data-science</div><div><span class="sw" style="background:#f0a35e"></span>finanza</div><div><span class="sw" style="background:#e57ea8"></span>divulgazione</div><div><span class="sw" style="background:#8fd0e5"></span>web-design</div>
  <div><span class="sw" style="background:#f0a35e"></span>engine</div>
  <div><span class="sw" style="background:#9ad06a"></span>skill</div>
  <div><span class="sw" style="background:#e5c07b"></span>ponte intercampo</div>
</div>
<svg></svg>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const G = {"nodes": [{"id": "fase:1", "label": "(1) Sorgenti — raw/", "layer": "processo", "kind": "fase", "size": 17}, {"id": "fase:2", "label": "(2) Modello — wiki/", "layer": "processo", "kind": "fase", "size": 17}, {"id": "fase:3", "label": "(3) Motore — engine/", "layer": "processo", "kind": "fase", "size": 17}, {"id": "fase:4", "label": "(4) Skill", "layer": "processo", "kind": "fase", "size": 17}, {"id": "fase:5", "label": "(5) Feedback — LESSONS", "layer": "processo", "kind": "fase", "size": 17}, {"id": "raw:aion", "label": "aion (raw)", "layer": "area:aion", "kind": "dato", "size": 25}, {"id": "wiki:aion", "label": "aion", "layer": "area:aion", "kind": "dato", "size": 24}, {"id": "raw:data-science", "label": "data-science (raw)", "layer": "area:data-science", "kind": "dato", "size": 10}, {"id": "wiki:data-science", "label": "data-science", "layer": "area:data-science", "kind": "dato", "size": 21}, {"id": "raw:finanza", "label": "finanza (raw)", "layer": "area:finanza", "kind": "dato", "size": 10}, {"id": "raw:divulgazione", "label": "divulgazione (raw)", "layer": "area:divulgazione", "kind": "dato", "size": 10}, {"id": "raw:web-design", "label": "web-design (raw)", "layer": "area:web-design", "kind": "dato", "size": 10}, {"id": "eng:aion-reasoner.md", "label": "aion-reasoner.md", "layer": "engine", "kind": "dato", "size": 8}, {"id": "eng:aion.model.schema.json", "label": "aion.model.schema.json", "layer": "engine", "kind": "dato", "size": 8}, {"id": "skill:aion", "label": "/aion", "layer": "skill", "kind": "dato", "size": 9}, {"id": "skill:oracle", "label": "/oracle", "layer": "skill", "kind": "dato", "size": 9}, {"id": "skill:triage", "label": "/triage", "layer": "skill", "kind": "dato", "size": 9}, {"id": "data:lessons", "label": "LESSONS / memory", "layer": "feedback", "kind": "dato", "size": 9}], "links": [{"source": "fase:1", "target": "fase:2", "kind": "flow"}, {"source": "fase:2", "target": "fase:3", "kind": "flow"}, {"source": "fase:3", "target": "fase:4", "kind": "flow"}, {"source": "fase:4", "target": "fase:5", "kind": "flow"}, {"source": "fase:5", "target": "fase:2", "kind": "loop"}, {"source": "fase:1", "target": "raw:aion", "kind": "has"}, {"source": "fase:2", "target": "wiki:aion", "kind": "has"}, {"source": "raw:aion", "target": "wiki:aion", "kind": "derive"}, {"source": "fase:1", "target": "raw:data-science", "kind": "has"}, {"source": "fase:2", "target": "wiki:data-science", "kind": "has"}, {"source": "raw:data-science", "target": "wiki:data-science", "kind": "derive"}, {"source": "fase:1", "target": "raw:finanza", "kind": "has"}, {"source": "fase:1", "target": "raw:divulgazione", "kind": "has"}, {"source": "fase:1", "target": "raw:web-design", "kind": "has"}, {"source": "fase:3", "target": "eng:aion-reasoner.md", "kind": "has"}, {"source": "fase:3", "target": "eng:aion.model.schema.json", "kind": "has"}, {"source": "fase:4", "target": "skill:aion", "kind": "has"}, {"source": "fase:4", "target": "skill:oracle", "kind": "has"}, {"source": "fase:4", "target": "skill:triage", "kind": "has"}, {"source": "fase:3", "target": "fase:4", "kind": "rel"}, {"source": "fase:5", "target": "data:lessons", "kind": "has"}], "meta": {"generato_da": "tools/altair_compact_view.py", "fonte": "graphify-out/graph.json + areas.json", "aree": ["aion", "data-science", "finanza", "divulgazione", "web-design"], "ponti_intercampo": 0, "descrizione": "Vista compatta: altair-brain come processo a 5 fasi, un nodo per area."}};
const color = {"area:aion": "#7ed0a8", "area:data-science": "#c39bf0", "area:finanza": "#f0a35e", "area:divulgazione": "#e57ea8", "area:web-design": "#8fd0e5", "processo": "#6ea8fe", "engine": "#f0a35e", "skill": "#9ad06a", "feedback": "#e5b567", "altro": "#888"};
const svg = d3.select("svg"), W = innerWidth, H = innerHeight;
const g = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.2,4]).on("zoom", e => g.attr("transform", e.transform)));
const sim = d3.forceSimulation(G.nodes)
  .force("link", d3.forceLink(G.links).id(d=>d.id).distance(l=>l.kind==="flow"?130:l.kind==="bridge"?90:70).strength(0.5))
  .force("charge", d3.forceManyBody().strength(-300))
  .force("center", d3.forceCenter(W/2, H/2))
  .force("collide", d3.forceCollide(26));
const link = g.append("g").selectAll("line").data(G.links).join("line").attr("class", d=>"lnk "+d.kind);
const node = g.append("g").selectAll("g").data(G.nodes).join("g")
  .attr("class", d=>d.kind==="fase"?"fase":"")
  .call(d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
node.append("circle").attr("r", d=>d.size).attr("fill", d=>color[d.layer]||"#888")
  .attr("stroke","#0f1115").attr("stroke-width",1.5);
node.append("text").attr("x", d=>d.size+4).attr("y", 4).text(d=>d.label);
sim.on("tick", () => {
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform", d=>`translate(${d.x},${d.y})`);
});
</script></body></html>
