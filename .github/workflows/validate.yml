name: valida brain

# Cancello di qualita: i consumatori (VPS, dispositivi, agenti) fanno pull alla cieca,
# quindi main deve essere SEMPRE valido. Tutto deterministico, nessuna API a pagamento.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # serve il commit precedente per l'anti-regressione del grafo

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dipendenze di verifica
        run: pip install -q jsonschema fastapi httpx pytest

      - name: Sintassi Python (server + tools + tests)
        run: python -m compileall -q server tools tests

      - name: Consistenza modello AION + JSON Schema (0 errori richiesti)
        run: python tools/validate_model.py

      - name: DB Oracle coerente col grezzo (fonte unica)
        run: |
          python tools/build_iching_db.py
          if ! git diff --quiet -- engine/iching.db.json; then
            echo "::error::engine/iching.db.json non coerente con raw/aion/aion-oracle.md — rigenera con tools/build_iching_db.py"
            exit 1
          fi

      - name: Wiki coerente col modello (fonte unica)
        run: |
          python tools/gen_wiki_from_model.py
          if ! git diff --quiet -- wiki/; then
            echo "::error::wiki/aion non coerente con engine/aion.model.json — rigenera con tools/gen_wiki_from_model.py"
            git diff --stat -- wiki/
            exit 1
          fi

      - name: Sottografi per area coerenti col grafo
        run: |
          python tools/build_area_graphs.py
          if ! git diff --quiet -- graphify-out/areas; then
            echo "::error::graphify-out/areas non coerente con graph.json — rigenera con tools/build_area_graphs.py"
            exit 1
          fi

      - name: JSON validi
        run: |
          python - <<'EOF'
          import json, sys
          files = ["areas.json", "engine/aion.model.json", "engine/router.json",
                   "engine/iching.db.json", "engine/schema/aion.model.schema.json",
                   "graphify-out/graph.json", "graphify-out/graph-compact.json"]
          bad = []
          for f in files:
              try:
                  json.load(open(f, encoding="utf-8"))
              except Exception as e:
                  bad.append(f"{f}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print(f"{len(files)} file JSON validi")
          EOF

      - name: Relazioni wiki (nessun wikilink rotto)
        run: python tools/check_wikilinks.py

      - name: Salute del grafo (coesione + anti-regressione)
        run: python tools/graph_health.py

      - name: Test API (sicurezza, oracle, inbox, degradazione)
        run: python -m pytest tests/ -q

      - name: Fine-riga LF sugli script per la VPS
        run: |
          if grep -rl $'\r' server/*.sh server/*.py tools/*.py 2>/dev/null; then
            echo "::error::trovati CRLF in file eseguiti su Linux"
            exit 1
          fi
          echo "LF ok"
